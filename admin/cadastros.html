<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastros · FinanceiroPro</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .cad-tabs { display:flex; gap:4px; margin-bottom:20px; }
    .cad-tab  { padding:8px 18px; border-radius:8px; border:1.5px solid var(--border); background:var(--card); color:var(--muted); font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .15s; }
    .cad-tab.active { background:var(--primary); color:#fff; border-color:var(--primary); }
    .cad-content { display:none; }
    .cad-content.active { display:block; }
    .city-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); }
    .city-row:last-child { border-bottom:none; }
    .city-name { font-size:14px; font-weight:500; display:flex; align-items:center; gap:8px; }
  </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon"><i class="fa-solid fa-chart-line"></i></div>
    <div class="brand-text"><strong>FinanceiroPro</strong><span>Painel Admin</span></div>
  </div>
  <nav style="overflow-y:auto;flex:1;">
    <div class="nav-section">Menu</div>
    <a href="kanban.html"     class="nav-item" onclick="closeSidebar()"><i class="fa-solid fa-table-columns"></i> Quadro de Pagamento</a>
    <a href="relatorios.html" class="nav-item" onclick="closeSidebar()"><i class="fa-solid fa-chart-bar"></i> Relatórios</a>
    <a href="aportes.html"    class="nav-item" onclick="closeSidebar()"><i class="fa-solid fa-building"></i> Aportes de Obras</a>
    <a href="cadastros.html"  class="nav-item active" onclick="closeSidebar()"><i class="fa-solid fa-table-list"></i> Cadastros</a>
  </nav>
  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="avatar"><i class="fa-solid fa-user"></i></div>
      <span id="userLabel">—</span>
    </div>
    <button class="btn-logout" onclick="logout()">
      <i class="fa-solid fa-right-from-bracket"></i> Sair
    </button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left" style="display:flex;align-items:center;gap:10px;">
      <button class="hamburger" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
      <h2>Cadastros</h2>
    </div>
  </div>

  <div class="page-body">
    <div style="max-width:600px;">

      <div class="cad-tabs">
        <button class="cad-tab active" onclick="switchTab('cidades', this)">
          <i class="fa-solid fa-location-dot"></i> Cidades Ativas
        </button>
        <button class="cad-tab" onclick="switchTab('tipos', this)">
          <i class="fa-solid fa-tags"></i> Tipos de Pagamento
        </button>
      </div>

      <!-- CIDADES -->
      <div class="cad-content active" id="tab-cidades">
        <div class="form-card" style="margin-bottom:20px;">
          <div class="form-card-header" style="padding-bottom:12px;">
            <h3 style="margin:0;font-size:15px;"><i class="fa-solid fa-plus" style="margin-right:6px;color:var(--primary);"></i>Adicionar Cidade</h3>
          </div>
          <div style="display:flex;gap:10px;align-items:flex-end;padding:0 20px 20px;">
            <div class="form-group" style="flex:1;margin:0;">
              <label>Nome da Cidade</label>
              <input type="text" id="newCity" class="form-control" placeholder="Ex: Campina Grande" onkeydown="if(event.key==='Enter')addCity()">
            </div>
            <button class="btn btn-primary" onclick="addCity()" id="addCityBtn">
              <i class="fa-solid fa-plus"></i> Adicionar
            </button>
          </div>
        </div>

        <div class="form-card">
          <div class="form-card-header" style="padding-bottom:12px;">
            <h3 style="margin:0;font-size:15px;"><i class="fa-solid fa-location-dot" style="margin-right:6px;color:var(--primary);"></i>Cidades Cadastradas</h3>
          </div>
          <div id="cityList" style="padding:0 20px 20px;">
            <div style="text-align:center;padding:30px;color:var(--muted);">Carregando...</div>
          </div>
        </div>
      </div>

      <!-- TIPOS -->
      <div class="cad-content" id="tab-tipos">
        <div class="form-card" style="margin-bottom:20px;">
          <div class="form-card-header" style="padding-bottom:12px;">
            <h3 style="margin:0;font-size:15px;"><i class="fa-solid fa-plus" style="margin-right:6px;color:var(--primary);"></i>Adicionar Tipo</h3>
          </div>
          <div style="display:flex;gap:10px;align-items:flex-end;padding:0 20px 20px;">
            <div class="form-group" style="flex:1;margin:0;">
              <label>Nome do Tipo</label>
              <input type="text" id="newTipo" class="form-control" placeholder="Ex: Material" onkeydown="if(event.key==='Enter')addTipo()">
            </div>
            <button class="btn btn-primary" onclick="addTipo()" id="addTipoBtn">
              <i class="fa-solid fa-plus"></i> Adicionar
            </button>
          </div>
        </div>

        <div class="form-card">
          <div class="form-card-header" style="padding-bottom:12px;">
            <h3 style="margin:0;font-size:15px;"><i class="fa-solid fa-tags" style="margin-right:6px;color:var(--primary);"></i>Tipos Cadastrados</h3>
          </div>
          <div id="tipoList" style="padding:0 20px 20px;">
            <div style="text-align:center;padding:30px;color:var(--muted);">Carregando...</div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../js/config.js"></script>
<script src="../js/auth-guard.js"></script>
<script>
document.getElementById('userLabel').textContent = getAdminUser();

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

function switchTab(name, btn) {
  document.querySelectorAll('.cad-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.cad-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 3500);
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ─── CIDADES ─── */
async function loadCities() {
  const list = document.getElementById('cityList');
  const { data, error } = await supabase.from('active_cities').select('id,name').order('name');
  if (error) { list.innerHTML = `<p style="color:var(--danger)">Erro ao carregar cidades.</p>`; return; }
  if (!data?.length) {
    list.innerHTML = `<div class="empty-state" style="padding:30px 0;">
      <div class="empty-icon"><i class="fa-solid fa-location-dot"></i></div>
      <h4>Nenhuma cidade cadastrada</h4><p>Adicione a primeira cidade acima.</p></div>`;
    return;
  }
  list.innerHTML = data.map(c => `
    <div class="city-row">
      <span class="city-name"><i class="fa-solid fa-location-dot" style="color:var(--primary);font-size:12px;"></i>${esc(c.name)}</span>
      <button class="btn btn-ghost btn-sm" onclick="deleteCity('${c.id}','${esc(c.name)}')" style="color:var(--danger);">
        <i class="fa-regular fa-trash-can"></i> Remover
      </button>
    </div>`).join('');
}

async function addCity() {
  const input = document.getElementById('newCity');
  const name  = input.value.trim();
  if (!name) { showToast('Informe o nome da cidade.', 'warning'); input.focus(); return; }
  const btn = document.getElementById('addCityBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  const { error } = await supabase.from('active_cities').insert({ name });
  if (error) {
    showToast(error.code === '23505' ? 'Cidade já cadastrada.' : 'Erro ao adicionar.', 'warning');
  } else { showToast(`"${name}" adicionada!`, 'success'); input.value = ''; loadCities(); }
  btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-plus"></i> Adicionar';
}

async function deleteCity(id, name) {
  if (!confirm(`Remover "${name}"?`)) return;
  const { error } = await supabase.from('active_cities').delete().eq('id', id);
  if (error) { showToast('Erro ao remover.', 'error'); return; }
  showToast(`"${name}" removida.`, 'success'); loadCities();
}

/* ─── TIPOS ─── */
async function loadTipos() {
  const list = document.getElementById('tipoList');
  const { data, error } = await supabase.from('payment_types').select('id,name').order('name');
  if (error) { list.innerHTML = `<p style="color:var(--danger)">Erro ao carregar tipos. Execute o SQL necessário.</p>`; return; }
  if (!data?.length) {
    list.innerHTML = `<div class="empty-state" style="padding:30px 0;">
      <div class="empty-icon"><i class="fa-solid fa-tags"></i></div>
      <h4>Nenhum tipo cadastrado</h4><p>Adicione o primeiro tipo acima.</p></div>`;
    return;
  }
  list.innerHTML = data.map(t => `
    <div class="city-row">
      <span class="city-name"><i class="fa-solid fa-tag" style="color:var(--primary);font-size:12px;"></i>${esc(t.name)}</span>
      <button class="btn btn-ghost btn-sm" onclick="deleteTipo('${t.id}','${esc(t.name)}')" style="color:var(--danger);">
        <i class="fa-regular fa-trash-can"></i> Remover
      </button>
    </div>`).join('');
}

async function addTipo() {
  const input = document.getElementById('newTipo');
  const name  = input.value.trim();
  if (!name) { showToast('Informe o nome do tipo.', 'warning'); input.focus(); return; }
  const btn = document.getElementById('addTipoBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  const { error } = await supabase.from('payment_types').insert({ name });
  if (error) {
    showToast(error.code === '23505' ? 'Tipo já cadastrado.' : 'Erro ao adicionar.', 'warning');
  } else { showToast(`"${name}" adicionado!`, 'success'); input.value = ''; loadTipos(); }
  btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-plus"></i> Adicionar';
}

async function deleteTipo(id, name) {
  if (!confirm(`Remover o tipo "${name}"?`)) return;
  const { error } = await supabase.from('payment_types').delete().eq('id', id);
  if (error) { showToast('Erro ao remover.', 'error'); return; }
  showToast(`"${name}" removido.`, 'success'); loadTipos();
}

loadCities();
loadTipos();
</script>
</body>
</html>
