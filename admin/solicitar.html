<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inserir Pagamento · FinanceiroPro</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon"><i class="fa-solid fa-chart-line"></i></div>
    <div class="brand-text"><strong>FinanceiroPro</strong><span>Painel Admin</span></div>
  </div>
  <nav style="overflow-y:auto;flex:1;">
    <div class="nav-section">Menu</div>
    <a href="kanban.html"     class="nav-item" onclick="closeSidebar()"><i class="fa-solid fa-table-columns"></i> Quadro de Pagamento</a>
    <a href="relatorios.html" class="nav-item" onclick="closeSidebar()"><i class="fa-solid fa-chart-bar"></i> Relatórios</a>
    <a href="aportes.html"    class="nav-item" onclick="closeSidebar()"><i class="fa-solid fa-building"></i> Aportes de Obras</a>
    <a href="cadastros.html"  class="nav-item" onclick="closeSidebar()"><i class="fa-solid fa-table-list"></i> Cadastros</a>
    <a href="solicitar.html"  class="nav-item active" onclick="closeSidebar()"><i class="fa-solid fa-file-invoice-dollar"></i> Inserir Pagamento</a>
  </nav>
  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="avatar"><i class="fa-solid fa-user"></i></div>
      <span id="userLabel">—</span>
    </div>
    <button class="btn-logout" onclick="logout()">
      <i class="fa-solid fa-right-from-bracket"></i> Sair
    </button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left" style="display:flex;align-items:center;gap:10px;">
      <button class="hamburger" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
      <h2>Inserir Pagamento</h2>
    </div>
  </div>

  <div class="page-body">
    <div style="max-width:560px;">

      <!-- Banner de sucesso -->
      <div id="successAlert" style="display:none;"></div>

      <!-- Card do formulário -->
      <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px;box-shadow:var(--shadow-sm);">
        <form id="paymentForm">

          <!-- Dados do solicitante -->
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
            <div class="form-group" style="margin-bottom:0;">
              <label>Chave Pix <span class="required">*</span></label>
              <input type="text" id="pix_key" class="form-control" placeholder="CPF, e-mail, telefone ou chave aleatória" required>
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label>Valor (R$) <span class="required">*</span></label>
              <input type="text" id="value" class="form-control" placeholder="0,00" required>
            </div>
          </div>

          <div class="form-group">
            <label>Nome Completo <span class="required">*</span></label>
            <input type="text" id="name" class="form-control" placeholder="Nome de quem vai receber" required>
          </div>

          <div class="form-group">
            <label>Cidade da Obra <span class="required">*</span></label>
            <select id="city" class="form-control" required>
              <option value="">Carregando...</option>
            </select>
          </div>

          <div class="form-group">
            <label>Motivo do Pagamento <span class="required">*</span></label>
            <textarea id="reason" class="form-control" rows="3" placeholder="Descreva o motivo da solicitação..." required></textarea>
          </div>

          <!-- Toggle: Registrar como já pago -->
          <div class="divider"></div>

          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:2px 0;user-select:none;">
            <input type="checkbox" id="jaPageToggle" onchange="toggleJaPago(this.checked)"
              style="width:16px;height:16px;accent-color:var(--success,#10b981);cursor:pointer;flex-shrink:0;">
            <span style="font-size:13px;font-weight:600;">Registrar como já pago</span>
          </label>

          <!-- Seção extra: campos de pagamento -->
          <div id="jaPageSection" style="display:none;margin-top:16px;">

            <div class="form-group">
              <label>Tipo de Pagamento <span class="required">*</span></label>
              <select id="payment_type" class="form-control">
                <option value="">Selecione o tipo...</option>
              </select>
            </div>

            <div class="form-group">
              <label>Observações</label>
              <textarea id="admin_notes" class="form-control" rows="2" placeholder="Observações sobre o pagamento (opcional)..."></textarea>
            </div>

            <div class="form-group">
              <label>Comprovante de Pagamento</label>
              <div class="upload-area" id="uploadArea"
                onclick="document.getElementById('proofFile').click()"
                ondragover="event.preventDefault();this.classList.add('drag-over')"
                ondragleave="this.classList.remove('drag-over')"
                ondrop="handleFileDrop(event)">
                <input type="file" id="proofFile" accept="image/*,.pdf" onchange="handleFileSelect(this)">
                <div class="upload-icon"><i class="fa-solid fa-arrow-up-from-bracket"></i></div>
                <strong>Clique ou arraste o comprovante</strong>
                <p>Imagens ou PDF — máx. 10 MB</p>
              </div>
              <div id="uploadPreview"></div>
            </div>

          </div>

          <!-- Ações -->
          <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
            <button type="button" class="btn btn-ghost" onclick="clearForm()">
              <i class="fa-solid fa-xmark"></i> Limpar
            </button>
            <button type="submit" class="btn btn-primary" id="submitBtn">
              <i class="fa-solid fa-paper-plane"></i> Enviar Solicitação
            </button>
          </div>

        </form>
      </div>

    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../js/config.js"></script>
<script src="../js/auth-guard.js"></script>
<script src="../js/cities.js"></script>
<script>
let selectedFile = null;

document.getElementById('userLabel').textContent = getAdminUser();

loadActiveCities('city', 'Selecione a cidade da obra');
loadPaymentTypes();

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

// ── Máscara de valor ──
document.getElementById('value').addEventListener('input', e => {
  let v = e.target.value.replace(/\D/g, '');
  if (!v) { e.target.value = ''; return; }
  e.target.value = (parseInt(v) / 100).toFixed(2).replace('.', ',');
});

// ── Toggle "já pago" ──
function toggleJaPago(checked) {
  document.getElementById('jaPageSection').style.display = checked ? '' : 'none';
  if (!checked) {
    selectedFile = null;
    document.getElementById('uploadPreview').innerHTML = '';
    document.getElementById('proofFile').value          = '';
    document.getElementById('payment_type').value       = '';
    document.getElementById('admin_notes').value        = '';
  }
}

// ── Tipos de pagamento ──
async function loadPaymentTypes() {
  const { data, error } = await supabase.from('payment_types').select('name').order('name');
  const types = (!error && data?.length)
    ? data.map(t => t.name)
    : ['Pagamento', 'Operacional', 'Mão de Obra'];
  const sel = document.getElementById('payment_type');
  sel.innerHTML = '<option value="">Selecione o tipo...</option>'
    + types.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('');
}

// ── Upload comprovante ──
function handleFileSelect(i) { if (i.files[0]) setFile(i.files[0]); }
function handleFileDrop(e) {
  e.preventDefault();
  document.getElementById('uploadArea').classList.remove('drag-over');
  if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
}
function setFile(f) {
  if (f.size > 10 * 1024 * 1024) { showToast('Arquivo muito grande (máx. 10 MB).', 'error'); return; }
  selectedFile = f;
  document.getElementById('uploadPreview').innerHTML =
    `<div class="upload-preview"><i class="fa-solid fa-paperclip"></i><span>${esc(f.name)}</span>
     <button class="btn btn-ghost btn-sm" onclick="clearFile()"><i class="fa-solid fa-xmark"></i></button></div>`;
}
function clearFile() {
  selectedFile = null;
  document.getElementById('uploadPreview').innerHTML = '';
  document.getElementById('proofFile').value = '';
}

// ── Toast ──
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 3500);
}

// ── Banner de sucesso ──
function showSuccessAlert(protocol, jaPago) {
  const el  = document.getElementById('successAlert');
  const msg = jaPago ? 'Pagamento registrado como pago!' : 'Solicitação enviada com sucesso!';
  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;background:var(--success-light,#f0fdf4);
      border:1.5px solid var(--success,#10b981);border-radius:var(--radius-lg,10px);
      padding:12px 16px;margin-bottom:14px;">
      <i class="fa-solid fa-circle-check" style="color:var(--success,#10b981);font-size:16px;flex-shrink:0;"></i>
      <div style="flex:1;font-size:13px;">
        ${msg} &nbsp;·&nbsp; Protocolo: <strong style="color:var(--primary);">${protocol}</strong>
      </div>
      <button class="btn btn-ghost btn-sm" style="padding:2px 8px;"
        onclick="document.getElementById('successAlert').style.display='none'">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>`;
  el.style.display = 'block';
}

// ── Limpar form ──
function clearForm() {
  document.getElementById('paymentForm').reset();
  document.getElementById('jaPageToggle').checked = false;
  toggleJaPago(false);
  document.getElementById('successAlert').style.display = 'none';
  loadActiveCities('city', 'Selecione a cidade da obra');
}

// ── Utilitário ──
function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

// ── Submit ──
document.getElementById('paymentForm').addEventListener('submit', async e => {
  e.preventDefault();

  const city    = document.getElementById('city').value;
  const value   = parseFloat(document.getElementById('value').value.replace(',', '.')) || 0;
  const jaPago  = document.getElementById('jaPageToggle').checked;
  const payType = document.getElementById('payment_type').value;

  if (!city)              { showToast('Selecione a cidade da obra.', 'warning'); return; }
  if (value <= 0)         { showToast('Informe um valor válido.', 'error'); return; }
  if (jaPago && !payType) { showToast('Selecione o tipo de pagamento.', 'warning'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Enviando...';

  const protocol = 'FP' + Date.now().toString().slice(-8).toUpperCase();

  // Upload comprovante (somente se "já pago")
  let proof_url = null;
  if (jaPago && selectedFile) {
    const ext  = selectedFile.name.split('.').pop();
    const path = `${protocol}/${Date.now()}.${ext}`;
    const { error: upErr } = await supabase.storage
      .from('comprovantes').upload(path, selectedFile, { upsert: true });
    if (upErr) {
      showToast('Erro ao enviar comprovante.', 'error');
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Enviar Solicitação';
      return;
    }
    proof_url = supabase.storage.from('comprovantes').getPublicUrl(path).data.publicUrl;
  }

  // Monta payload
  const payload = {
    pix_key:  document.getElementById('pix_key').value.trim(),
    value,
    city,
    name:     document.getElementById('name').value.trim(),
    reason:   document.getElementById('reason').value.trim(),
    status:   jaPago ? 'pago' : 'pendente',
    protocol,
  };

  if (jaPago) {
    payload.payment_type  = payType;
    payload.responded_at  = new Date().toISOString();
    const notes = document.getElementById('admin_notes').value.trim();
    if (notes)      payload.admin_notes = notes;
    if (proof_url)  payload.proof_url   = proof_url;
  }

  const { error } = await supabase.from('payment_requests').insert(payload);

  btn.disabled = false;
  btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Enviar Solicitação';

  if (error) { showToast('Erro ao enviar. Tente novamente.', 'error'); return; }

  // Reset após sucesso
  document.getElementById('paymentForm').reset();
  document.getElementById('jaPageToggle').checked = false;
  toggleJaPago(false);
  loadActiveCities('city', 'Selecione a cidade da obra');
  showSuccessAlert(protocol, jaPago);
});
</script>
</body>
</html>
