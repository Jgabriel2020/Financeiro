<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aportes de Obras · FinanceiroPro</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon"><i class="fa-solid fa-chart-line"></i></div>
    <div class="brand-text"><strong>FinanceiroPro</strong><span>Painel Admin</span></div>
  </div>
  <nav>
    <div class="nav-section">Menu</div>
    <a href="kanban.html" class="nav-item"><i class="fa-solid fa-table-columns"></i> Kanban</a>
    <a href="relatorios.html" class="nav-item"><i class="fa-solid fa-chart-bar"></i> Relatórios</a>
    <a href="aportes.html" class="nav-item active"><i class="fa-solid fa-building"></i> Aportes de Obras</a>
  </nav>
  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="avatar"><i class="fa-solid fa-user"></i></div>
      <span id="userLabel">—</span>
    </div>
    <button class="btn-logout" onclick="logout()">
      <i class="fa-solid fa-right-from-bracket"></i> Sair
    </button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left"><h2>Aportes de Obras</h2></div>
    <div class="topbar-right">
      <button class="btn btn-primary btn-sm" onclick="openModal()">
        <i class="fa-solid fa-plus"></i> Novo Aporte
      </button>
    </div>
  </div>

  <div class="page-body">
    <div class="filters-bar">
      <div class="form-group">
        <label>Estado</label>
        <select id="fState" class="form-control" onchange="onFilterStateChange()" disabled>
          <option value="">Todos</option>
        </select>
      </div>
      <div class="form-group">
        <label>Cidade</label>
        <select id="fCity" class="form-control" onchange="applyFilter()" disabled>
          <option value="">Todas</option>
        </select>
      </div>
      <div class="form-group">
        <label>Obra</label>
        <input type="text" id="fObra" class="form-control" placeholder="Nome da obra..." oninput="applyFilter()">
      </div>
      <div class="form-group">
        <label>Data Inicial</label>
        <input type="date" id="fDataIni" class="form-control" onchange="applyFilter()">
      </div>
      <div class="form-group">
        <label>Data Final</label>
        <input type="date" id="fDataFim" class="form-control" onchange="applyFilter()">
      </div>
      <div style="padding-bottom:1px;">
        <button class="btn btn-ghost btn-sm" onclick="clearFilter()">
          <i class="fa-solid fa-xmark"></i> Limpar
        </button>
      </div>
    </div>

    <div class="report-summary" id="summaryCards"></div>
    <div class="aportes-grid" id="aportesGrid">
      <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted);">Carregando...</div>
    </div>
  </div>
</div>

<!-- MODAL NOVO APORTE -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal" style="max-width:580px;">
    <div class="modal-header">
      <h3>Novo Aporte</h3>
      <button class="btn-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Nome da Obra <span class="required">*</span></label>
        <input type="text" id="workName" class="form-control" placeholder="Ex: Obra Rua das Flores, 123">
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label>Estado</label>
          <select id="mState" class="form-control" disabled>
            <option value="">Carregando...</option>
          </select>
        </div>
        <div class="form-group">
          <label>Cidade</label>
          <select id="mCity" class="form-control" disabled>
            <option value="">Selecione o estado</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Descrição</label>
        <textarea id="description" class="form-control" placeholder="Descreva o aporte realizado..."></textarea>
      </div>
      <div class="form-group">
        <label>Valor (R$)</label>
        <input type="text" id="amount" class="form-control" placeholder="0,00">
      </div>
      <div class="form-group">
        <label>Anexo / Documento</label>
        <div class="upload-area" id="uploadArea" onclick="document.getElementById('aportFile').click()"
          ondragover="event.preventDefault();this.classList.add('drag-over')"
          ondragleave="this.classList.remove('drag-over')"
          ondrop="handleFileDrop(event)">
          <input type="file" id="aportFile" accept="image/*,.pdf,.xlsx,.xls,.docx" onchange="handleFileSelect(this)">
          <div class="upload-icon"><i class="fa-solid fa-arrow-up-from-bracket"></i></div>
          <strong>Clique ou arraste o arquivo</strong>
          <p>Imagens, PDF, Excel, Word — máx. 20 MB</p>
        </div>
        <div id="uploadPreview"></div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px;">
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveAporte()" id="saveBtn">
          <i class="fa-solid fa-floppy-disk"></i> Salvar
        </button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL VISUALIZAR -->
<div class="modal-overlay" id="viewOverlay" onclick="closeViewOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="viewTitle">Detalhes do Aporte</h3>
      <button class="btn-close" onclick="closeView()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body" id="viewBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../js/config.js"></script>
<script src="../js/auth-guard.js"></script>
<script src="../js/ibge.js"></script>
<script>
let allAportes   = [];
let filtered     = [];
let selectedFile = null;

document.getElementById('userLabel').textContent = getAdminUser();

// Carrega estados no filtro
(async () => {
  const sel = document.getElementById('fState');
  sel.innerHTML = '<option value="">Todos os estados</option>';
  sel.disabled = false;
  try {
    const res   = await fetch('https://servicodados.ibge.gov.br/api/v1/localidades/estados?orderBy=nome');
    const data  = await res.json();
    data.forEach(s => sel.appendChild(new Option(`${s.nome} (${s.sigla})`, s.sigla)));
  } catch { /* silencioso */ }
})();

async function onFilterStateChange() {
  const uf    = document.getElementById('fState').value;
  const cSel  = document.getElementById('fCity');
  cSel.innerHTML = '<option value="">Todas as cidades</option>';
  cSel.disabled  = true;
  if (!uf) { applyFilter(); return; }
  try {
    const res  = await fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios?orderBy=nome`);
    const data = await res.json();
    data.forEach(c => cSel.appendChild(new Option(c.nome, c.nome)));
    cSel.disabled = false;
  } catch { cSel.disabled = false; }
  applyFilter();
}

async function loadAportes() {
  const { data, error } = await supabase
    .from('work_contributions')
    .select('*')
    .order('created_at', { ascending: false });
  if (error) { showToast('Erro ao carregar aportes.', 'error'); return; }
  allAportes = data || [];
  applyFilter();
}

function applyFilter() {
  const fObra    = document.getElementById('fObra').value.toLowerCase().trim();
  const fState   = document.getElementById('fState').value;
  const fCity    = document.getElementById('fCity').value;
  const fDataIni = document.getElementById('fDataIni').value;
  const fDataFim = document.getElementById('fDataFim').value;

  filtered = allAportes.filter(a => {
    if (fObra    && !a.work_name.toLowerCase().includes(fObra)) return false;
    if (fState   && a.state !== fState) return false;
    if (fCity    && a.city  !== fCity)  return false;
    if (fDataIni && new Date(a.created_at) < new Date(fDataIni)) return false;
    if (fDataFim && new Date(a.created_at) > new Date(fDataFim + 'T23:59:59')) return false;
    return true;
  });

  renderGrid();
  renderSummary();
}

function clearFilter() {
  ['fObra','fState','fDataIni','fDataFim'].forEach(id => document.getElementById(id).value = '');
  const cSel = document.getElementById('fCity');
  cSel.innerHTML = '<option value="">Todas as cidades</option>';
  cSel.disabled = true;
  applyFilter();
}

function renderSummary() {
  const total = filtered.reduce((s, a) => s + parseFloat(a.amount || 0), 0);
  document.getElementById('summaryCards').innerHTML = `
    <div class="summary-card">
      <div class="s-label">Total de Aportes</div>
      <div class="s-value">${filtered.length}</div>
    </div>
    <div class="summary-card">
      <div class="s-label">Valor Total</div>
      <div class="s-value" style="color:var(--success)">R$ ${money(total)}</div>
    </div>
    <div class="summary-card">
      <div class="s-label">Com Anexo</div>
      <div class="s-value">${filtered.filter(a => a.attachment_url).length}</div>
    </div>`;
}

function renderGrid() {
  const grid = document.getElementById('aportesGrid');
  if (!filtered.length) {
    grid.innerHTML = `<div style="grid-column:1/-1">
      <div class="empty-state">
        <div class="empty-icon"><i class="fa-solid fa-building"></i></div>
        <h4>Nenhum aporte cadastrado</h4>
        <p>Clique em "Novo Aporte" para começar</p>
      </div></div>`;
    return;
  }

  grid.innerHTML = filtered.map(a => `
    <div class="aporte-card">
      <div class="aporte-card-header">
        <div>
          <div class="aporte-name">${esc(a.work_name)}</div>
          ${a.state || a.city ? `<div class="aporte-desc"><i class="fa-solid fa-location-dot" style="font-size:10px;margin-right:3px;"></i>${[a.city, a.state].filter(Boolean).join(' — ')}</div>` : ''}
        </div>
        <div class="aporte-icon"><i class="fa-solid fa-building"></i></div>
      </div>
      ${a.description ? `<p style="font-size:12.5px;color:var(--muted);margin-bottom:8px;">${esc(a.description)}</p>` : ''}
      ${a.amount ? `<div class="aporte-amount">R$ ${money(a.amount)}</div>` : ''}
      ${a.attachment_url
        ? `<a href="${a.attachment_url}" target="_blank" class="aporte-attachment">
             <i class="fa-solid fa-paperclip"></i> ${esc(a.attachment_name || 'Ver Anexo')}
           </a>` : ''}
      <div class="aporte-date"><i class="fa-regular fa-calendar"></i> ${date(a.created_at)}</div>
      <div class="aporte-actions">
        <button class="btn btn-ghost btn-sm" onclick="viewAporte('${a.id}')">
          <i class="fa-regular fa-eye"></i> Detalhes
        </button>
        <button class="btn btn-ghost btn-sm" onclick="deleteAporte('${a.id}','${esc(a.work_name)}')">
          <i class="fa-regular fa-trash-can"></i> Excluir
        </button>
      </div>
    </div>`).join('');
}

// ── Modal novo ──
function openModal() {
  selectedFile = null;
  ['workName','description','amount'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('uploadPreview').innerHTML = '';
  document.getElementById('aportFile').value = '';
  setupStateCityPair('mState', 'mCity');
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal()         { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target.id === 'modalOverlay') closeModal(); }

async function saveAporte() {
  const workName = document.getElementById('workName').value.trim();
  if (!workName) { showToast('Informe o nome da obra.', 'warning'); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Salvando...';

  const amount = parseFloat(document.getElementById('amount').value.replace(',', '.')) || null;
  const state  = document.getElementById('mState').value || null;
  const city   = document.getElementById('mCity').value  || null;

  let attachment_url = null, attachment_name = null;
  if (selectedFile) {
    const path = `${Date.now()}_${selectedFile.name}`;
    const { error: upErr } = await supabase.storage.from('aportes').upload(path, selectedFile, { upsert: true });
    if (upErr) {
      showToast('Erro ao enviar arquivo.', 'error');
      btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Salvar';
      return;
    }
    const { data: u } = supabase.storage.from('aportes').getPublicUrl(path);
    attachment_url  = u.publicUrl;
    attachment_name = selectedFile.name;
  }

  const { error } = await supabase.from('work_contributions').insert({
    work_name:   workName,
    description: document.getElementById('description').value.trim() || null,
    amount, state, city, attachment_url, attachment_name
  });

  if (error) { showToast('Erro ao salvar aporte.', 'error'); }
  else { showToast('Aporte salvo!', 'success'); closeModal(); loadAportes(); }

  btn.disabled = false;
  btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Salvar';
}

async function deleteAporte(id, name) {
  if (!confirm(`Excluir o aporte "${name}"?`)) return;
  const { error } = await supabase.from('work_contributions').delete().eq('id', id);
  if (error) { showToast('Erro ao excluir.', 'error'); return; }
  showToast('Aporte excluído.', 'success');
  loadAportes();
}

function viewAporte(id) {
  const a = allAportes.find(x => x.id === id);
  if (!a) return;
  document.getElementById('viewTitle').textContent = a.work_name;
  document.getElementById('viewBody').innerHTML = `
    <div class="info-grid">
      <div class="info-item"><label>Obra</label><p>${esc(a.work_name)}</p></div>
      ${a.amount ? `<div class="info-item"><label>Valor</label><p style="color:var(--success);font-weight:700;">R$ ${money(a.amount)}</p></div>` : ''}
      ${a.state  ? `<div class="info-item"><label>Estado</label><p>${esc(a.state)}</p></div>` : ''}
      ${a.city   ? `<div class="info-item"><label>Cidade</label><p>${esc(a.city)}</p></div>` : ''}
      <div class="info-item"><label>Data</label><p>${date(a.created_at)}</p></div>
      ${a.description ? `<div class="info-item" style="grid-column:1/-1"><label>Descrição</label><p>${esc(a.description)}</p></div>` : ''}
    </div>
    ${a.attachment_url
      ? `<a href="${a.attachment_url}" target="_blank" class="btn btn-primary" style="margin-top:8px;">
           <i class="fa-solid fa-paperclip"></i> Abrir Anexo
         </a>`
      : `<p style="font-size:13px;color:var(--muted);">Nenhum anexo vinculado.</p>`}`;
  document.getElementById('viewOverlay').classList.add('open');
}

function closeView()          { document.getElementById('viewOverlay').classList.remove('open'); }
function closeViewOutside(e)  { if (e.target.id === 'viewOverlay') closeView(); }

function handleFileSelect(i) { if (i.files[0]) setFile(i.files[0]); }
function handleFileDrop(e)   { e.preventDefault(); document.getElementById('uploadArea').classList.remove('drag-over'); if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]); }
function setFile(f) {
  if (f.size > 20*1024*1024) { showToast('Arquivo muito grande (máx. 20 MB).', 'error'); return; }
  selectedFile = f;
  document.getElementById('uploadPreview').innerHTML =
    `<div class="upload-preview"><i class="fa-solid fa-paperclip"></i><span>${esc(f.name)}</span><button class="btn btn-ghost btn-sm" onclick="clearFile()"><i class="fa-solid fa-xmark"></i></button></div>`;
}
function clearFile() { selectedFile = null; document.getElementById('uploadPreview').innerHTML = ''; document.getElementById('aportFile').value = ''; }

document.getElementById('amount').addEventListener('input', e => {
  let v = e.target.value.replace(/\D/g, '');
  if (!v) { e.target.value = ''; return; }
  e.target.value = (parseInt(v) / 100).toFixed(2).replace('.', ',');
});

function money(v) { return parseFloat(v||0).toLocaleString('pt-BR', { minimumFractionDigits:2 }); }
function date(d)  { return new Date(d).toLocaleString('pt-BR', { dateStyle:'short', timeStyle:'short' }); }
function esc(s)   { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 3500);
}

loadAportes();
</script>
</body>
</html>
