<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · FinanceiroPro</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="login-page">
    <div style="width:100%;max-width:380px;">
      <a href="index.html" class="back-link" style="justify-content:center;display:flex;margin-bottom:20px;">
        <i class="fa-solid fa-arrow-left"></i> Voltar ao início
      </a>

      <div class="login-card">
        <div class="login-header">
          <div class="login-icon">
            <i class="fa-solid fa-lock"></i>
          </div>
          <h2>Área Administrativa</h2>
          <p>Acesso restrito a gestores</p>
        </div>

        <form id="loginForm">
          <div class="form-group">
            <label>Usuário</label>
            <input type="text" id="username" class="form-control" placeholder="seu usuário" required autofocus>
          </div>

          <div class="form-group">
            <label>Senha</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
          </div>

          <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:6px;" id="loginBtn">
            Entrar
          </button>
        </form>

        <p style="text-align:center;font-size:12px;color:#94A3B8;margin-top:20px;">
          Problemas de acesso? Contate o administrador.
        </p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/config.js"></script>
  <script>
    if (localStorage.getItem('admin_session')) {
      window.location.href = 'admin/kanban.html';
    }

    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast show ${type}`;
      setTimeout(() => t.className = 'toast', 3500);
    }

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Entrando...';

      const reset = () => { btn.disabled = false; btn.textContent = 'Entrar'; };

      try {
        const { data, error } = await supabase
          .from('admins')
          .select('username')
          .eq('username', document.getElementById('username').value.trim())
          .eq('password', document.getElementById('password').value)
          .maybeSingle();

        if (error) {
          console.error('Supabase error:', error);
          showToast('Erro ao conectar com o banco de dados.', 'error');
          reset(); return;
        }

        if (!data) {
          showToast('Usuário ou senha incorretos.', 'error');
          reset(); return;
        }

        localStorage.setItem('admin_session', data.username);
        window.location.href = 'admin/kanban.html';
      } catch (err) {
        console.error('Exceção:', err);
        showToast('Erro inesperado. Verifique o console.', 'error');
        reset();
      }
    });
  </script>
</body>
</html>
