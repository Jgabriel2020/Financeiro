<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitar Pagamento · FinanceiroPro</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="public-page">
    <div style="width:100%;max-width:500px;">
      <a href="index.html" class="back-link">
        <i class="fa-solid fa-arrow-left"></i> Voltar ao início
      </a>

      <div class="form-card" id="formSection">
        <div class="form-card-header">
          <div class="form-card-icon">
            <i class="fa-solid fa-file-invoice-dollar"></i>
          </div>
          <h2>Solicitar Pagamento</h2>
          <p>Preencha os dados para enviar sua solicitação</p>
        </div>

        <form id="paymentForm">
          <div class="form-group">
            <label>Chave Pix <span class="required">*</span></label>
            <input type="text" id="pix_key" class="form-control" placeholder="CPF, e-mail, telefone ou chave aleatória" required>
          </div>

          <div class="form-group">
            <label>Valor (R$) <span class="required">*</span></label>
            <input type="text" id="value" class="form-control" placeholder="0,00" required>
          </div>

          <div class="form-group">
            <label>Nome Completo <span class="required">*</span></label>
            <input type="text" id="name" class="form-control" placeholder="Seu nome completo" required>
          </div>

          <div class="form-group">
            <label>Estado <span class="required">*</span></label>
            <select id="state" class="form-control" required disabled>
              <option value="">Carregando estados...</option>
            </select>
          </div>

          <div class="form-group">
            <label>Cidade <span class="required">*</span></label>
            <select id="city" class="form-control" required disabled>
              <option value="">Selecione o estado primeiro</option>
            </select>
          </div>

          <div class="form-group">
            <label>Motivo do Pagamento <span class="required">*</span></label>
            <textarea id="reason" class="form-control" placeholder="Descreva o motivo da solicitação..." required></textarea>
          </div>

          <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;" id="submitBtn">
            Enviar Solicitação
          </button>
        </form>
      </div>

      <div class="form-card" id="successSection" style="display:none;">
        <div class="success-block">
          <div class="success-icon"><i class="fa-solid fa-check"></i></div>
          <h3>Solicitação enviada!</h3>
          <p>Seu pedido foi recebido com sucesso.</p>
          <p style="margin-top:4px;">O pagamento será processado em até <strong>24 horas</strong>.</p>
          <div class="protocol-box" id="protocolDisplay"></div>
          <p style="font-size:12px;color:#94A3B8;margin-bottom:22px;">
            Guarde este número de protocolo para acompanhamento.
          </p>
          <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
            <a href="solicitar.html" class="btn btn-primary">Nova solicitação</a>
            <a href="index.html" class="btn btn-ghost">Voltar ao início</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/ibge.js"></script>
  <script>
    setupStateCityPair('state', 'city');

    document.getElementById('value').addEventListener('input', e => {
      let v = e.target.value.replace(/\D/g, '');
      if (!v) { e.target.value = ''; return; }
      e.target.value = (parseInt(v) / 100).toFixed(2).replace('.', ',');
    });

    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast show ${type}`;
      setTimeout(() => t.className = 'toast', 3500);
    }

    document.getElementById('paymentForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');

      const state = document.getElementById('state').value;
      const city  = document.getElementById('city').value;
      if (!state || !city) { showToast('Selecione o estado e a cidade.', 'warning'); return; }

      const value = parseFloat(document.getElementById('value').value.replace(',', '.')) || 0;
      if (value <= 0) { showToast('Informe um valor válido.', 'error'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Enviando...';

      const protocol = 'FP' + Date.now().toString().slice(-8).toUpperCase();

      const { error } = await supabase.from('payment_requests').insert({
        pix_key:  document.getElementById('pix_key').value.trim(),
        value,
        name:     document.getElementById('name').value.trim(),
        state,
        city,
        reason:   document.getElementById('reason').value.trim(),
        status:   'pendente',
        protocol
      });

      if (error) {
        showToast('Erro ao enviar. Tente novamente.', 'error');
        btn.disabled = false;
        btn.textContent = 'Enviar Solicitação';
        return;
      }

      document.getElementById('formSection').style.display = 'none';
      document.getElementById('successSection').style.display = 'block';
      document.getElementById('protocolDisplay').textContent = protocol;
    });
  </script>
</body>
</html>
