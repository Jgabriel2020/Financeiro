<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitar Pagamento · FinanceiroPro</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="public-page">
    <div style="width:100%;max-width:520px;">
      <a href="index.html" class="back-link">← Voltar ao início</a>

      <div class="form-card" id="formSection">
        <div class="form-card-header">
          <div class="icon">💸</div>
          <h2>Solicitar Pagamento</h2>
          <p>Preencha os dados abaixo para enviar sua solicitação</p>
        </div>

        <form id="paymentForm">
          <div class="form-group">
            <label>Chave Pix <span>*</span></label>
            <input type="text" id="pix_key" class="form-control" placeholder="CPF, e-mail, telefone ou chave aleatória" required>
          </div>

          <div class="form-group">
            <label>Valor (R$) <span>*</span></label>
            <input type="text" id="value" class="form-control" placeholder="0,00" required>
          </div>

          <div class="form-group">
            <label>Nome Completo <span>*</span></label>
            <input type="text" id="name" class="form-control" placeholder="Seu nome completo" required>
          </div>

          <div class="form-group">
            <label>Cidade <span>*</span></label>
            <input type="text" id="city" class="form-control" placeholder="Ex: São Paulo - SP" required>
          </div>

          <div class="form-group">
            <label>Motivo do Pagamento <span>*</span></label>
            <textarea id="reason" class="form-control" rows="3" placeholder="Descreva o motivo da solicitação..." required></textarea>
          </div>

          <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:14px;" id="submitBtn">
            Enviar Solicitação
          </button>
        </form>
      </div>

      <!-- Success -->
      <div class="form-card" id="successSection" style="display:none;">
        <div class="success-card">
          <div class="icon">✅</div>
          <h3>Solicitação Enviada!</h3>
          <p>Sua solicitação foi recebida com sucesso.</p>
          <p>O pagamento será processado em até <strong>24 horas</strong>.</p>

          <div class="protocol-box" id="protocolDisplay"></div>

          <p style="font-size:12px;color:#94A3B8;margin-bottom:20px;">
            Guarde este número de protocolo para acompanhamento.
          </p>

          <div style="display:flex;gap:10px;justify-content:center;">
            <a href="solicitar.html" class="btn btn-primary">Nova Solicitação</a>
            <a href="index.html" class="btn btn-ghost">Início</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/config.js"></script>
  <script>
    // Formata valor como moeda
    const valueInput = document.getElementById('value');
    valueInput.addEventListener('input', (e) => {
      let v = e.target.value.replace(/\D/g, '');
      if (!v) { e.target.value = ''; return; }
      v = (parseInt(v) / 100).toFixed(2);
      e.target.value = v.replace('.', ',');
    });

    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast show ${type}`;
      setTimeout(() => t.className = 'toast', 3500);
    }

    function parseValue(str) {
      return parseFloat(str.replace(',', '.')) || 0;
    }

    function generateProtocol() {
      return 'FP' + Date.now().toString().slice(-8).toUpperCase();
    }

    document.getElementById('paymentForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Enviando...';

      const value = parseValue(document.getElementById('value').value);
      if (value <= 0) {
        showToast('Informe um valor válido', 'error');
        btn.disabled = false;
        btn.textContent = 'Enviar Solicitação';
        return;
      }

      const protocol = generateProtocol();

      const { error } = await supabase.from('payment_requests').insert({
        pix_key:   document.getElementById('pix_key').value.trim(),
        value,
        name:      document.getElementById('name').value.trim(),
        city:      document.getElementById('city').value.trim(),
        reason:    document.getElementById('reason').value.trim(),
        status:    'pendente',
        protocol
      });

      if (error) {
        showToast('Erro ao enviar solicitação. Tente novamente.', 'error');
        console.error(error);
        btn.disabled = false;
        btn.textContent = 'Enviar Solicitação';
        return;
      }

      document.getElementById('formSection').style.display = 'none';
      document.getElementById('successSection').style.display = 'block';
      document.getElementById('protocolDisplay').textContent = protocol;
    });
  </script>
</body>
</html>
